name: 📝 Auto Patch Collector

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  collect-patches:
    name: 📦 Collect Session Patches
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Check for session patches
        id: check
        run: |
          if [ -d "session-patches" ] && [ "$(ls -A session-patches/*.patch 2>/dev/null | wc -l)" -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 📦 Upload patches as artifact
        if: steps.check.outputs.found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: session-patches
          path: session-patches/*.patch
          retention-days: 7

      - name: 📊 Summary
        if: steps.check.outputs.found == 'true'
        run: |
          echo "### 📝 Session Patches Found" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          ls -lh session-patches/*.patch | awk '{print "- " $9 " (" $5 ")"}' >> "$GITHUB_STEP_SUMMARY"
